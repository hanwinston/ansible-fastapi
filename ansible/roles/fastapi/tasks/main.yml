---
- name: Install required packages
  apt:
    name:
      - git
      - curl
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: yes

- name: Install Poetry
  become_user: ubuntu
  shell: |
    curl -sSL https://install.python-poetry.org | python3 -
  args:
    creates: /home/ubuntu/.local/bin/poetry

- name: Ensure application directory exists
  file:
    path: /opt/fastapi-demo
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Clone or update FastAPI repository
  become_user: "{{ app_user }}"
  git:
    repo: "{{ app_repo }}"
    dest: "{{ app_dir }}"
    version: "{{ app_branch }}"
    update: yes
    accept_hostkey: yes

- name: Install Python dependencies
  become_user: ubuntu
  command:
    cmd: /home/ubuntu/.local/bin/poetry install --only main
    chdir: /opt/fastapi-demo

- name: Install systemd service
  template:
    src: fastapi.service.j2
    dest: /etc/systemd/system/fastapi.service
    owner: root
    group: root
    mode: "0644"

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable FastAPI service
  systemd:
    name: fastapi
    enabled: yes

- name: Restart FastAPI service
  systemd:
    name: fastapi
    state: restarted