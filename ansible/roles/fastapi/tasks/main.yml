---
- name: Install packages
  apt:
    name: [python3, python3-venv, git, nginx]
    state: present
    update_cache: yes

- git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: main

- command:
    cmd: python3 -m venv {{ venv_dir }}
    creates: "{{ venv_dir }}/bin/python"

- pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ venv_dir }}"

- template:
    src: fastapi.service.j2
    dest: /etc/systemd/system/{{ app_name }}.service
  notify: Restart FastAPI

- systemd:
    name: "{{ app_name }}"
    enabled: yes
    state: started

- template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/{{ app_name }}
  notify: Restart Nginx
